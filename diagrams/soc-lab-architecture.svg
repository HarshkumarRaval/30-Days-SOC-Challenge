  <!-- ===================== Inside-VPC flows ===================== -->
  <!-- Windows -> Fleet (managed) -->
  <path d="M200 368 C230 400 270 410 300 428" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#aGray)"/>
  <text x="210" y="404" fill="#475569" font-size="8.5" font-weight="700">managed</text>
  <!-- Ubuntu -> Fleet (managed) -->
  <path d="M548 368 C520 400 478 410 448 428" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#aGray)"/>
  <text x="486" y="404" fill="#475569" font-size="8.5" font-weight="700" text-anchor="end">managed</text>

  <!-- Windows -> Elastic (forward logs) outer left -->
  <path d="M104 368 C70 440 72 530 120 560 C160 584 220 582 268 584" fill="none" stroke="#2563eb" stroke-width="1.6" marker-end="url(#aBlue)"/>
  <text x="62" y="470" fill="#2563eb" font-size="8.5" font-weight="700">forward logs</text>
  <text x="62" y="481" fill="#2563eb" font-size="8.5" font-weight="700">via agent</text>

  <!-- Ubuntu -> Elastic (forward logs) — routed to core right side -->
  <path d="M576 368 C600 440 560 510 480 556" fill="none" stroke="#2563eb" stroke-width="1.6" marker-end="url(#aBlue)"/>
  <text x="600" y="450" fill="#2563eb" font-size="8.5" font-weight="700">forward logs</text>
  <text x="600" y="461" fill="#2563eb" font-size="8.5" font-weight="700">via agent</text>

