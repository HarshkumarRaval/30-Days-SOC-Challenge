  <!-- Title -->
  <text x="44" y="28" fill="#0f2747" font-size="15" font-weight="700">SOC Home Lab — Logical Network Diagram</text>
  <text x="520" y="28" fill="#0891b2" font-size="9.5" font-weight="700">Harshkumar Raval · HRTechVerse · Day 01</text>
