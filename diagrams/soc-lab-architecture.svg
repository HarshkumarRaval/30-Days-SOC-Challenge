    <line x1="740" y1="596" x2="772" y2="596" stroke="#2563eb" stroke-width="2"/><text x="780" y="599" fill="#33414f" font-size="9">Log forwarding (agent)</text>
    <line x1="740" y1="616" x2="772" y2="616" stroke="#f59e0b" stroke-width="2"/><text x="780" y="619" fill="#33414f" font-size="9">Agent management</text>
    <line x1="740" y1="636" x2="772" y2="636" stroke="#ca8a04" stroke-width="2"/><text x="780" y="639" fill="#33414f" font-size="9">Alerts / tickets</text>
    <line x1="740" y1="656" x2="772" y2="656" stroke="#64748b" stroke-width="2"/><text x="780" y="659" fill="#33414f" font-size="9">Managed (enrolled)</text>
    <line x1="740" y1="676" x2="772" y2="676" stroke="#0891b2" stroke-width="2" stroke-dasharray="5 3"/><text x="780" y="679" fill="#33414f" font-size="9">Analyst web access</text>
    <line x1="740" y1="696" x2="772" y2="696" stroke="#ef4444" stroke-width="2"/><text x="780" y="699" fill="#33414f" font-size="9">Attacker path</text>
    <rect x="740" y="710" width="14" height="11" rx="2" fill="#0a1628" stroke="#00d4ff" stroke-width="1.6"/><text x="762" y="719" fill="#33414f" font-size="9">SIEM core</text>
