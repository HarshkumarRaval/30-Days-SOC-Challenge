    <marker id="aOrange" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/></marker>
    <marker id="aOrangeS" markerWidth="9" markerHeight="9" refX="2" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 Z" fill="#f59e0b"/></marker>
    <marker id="aYellow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ca8a04"/></marker>
